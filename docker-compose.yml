version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: healthhelp-db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: healthhelp
    ports:
      - "5432:5432"
    volumes:
      - healthhelp_pgdata:/var/lib/postgresql/data

volumes:
  healthhelp_pgdata:
