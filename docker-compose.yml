version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: healthhelp-db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: healthhelp
    ports:
      - "5432:5432"
    volumes:
      - healthhelp_pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: healthhelp-minio
    ports:
      - "9000:9000" # พอร์ตสำหรับให้โค้ด Next.js อัปโหลดไฟล์ (API)
      - "9001:9001" # พอร์ตสำหรับเปิดหน้าเว็บจัดการ (Console)
    environment:
      MINIO_ROOT_USER: "minioadmin" # เปลี่ยนให้ตรงกับ .env ของคุณ
      MINIO_ROOT_PASSWORD: "minioadmin" # เปลี่ยนให้ตรงกับ .env ของคุณ
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  healthhelp_pgdata:
  minio_data:
